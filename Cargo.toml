[package]
name = "clara"
version = "0.1.0"
edition = "2021"

[dependencies]
tokio = { version = "1.0", features = ["full"] }
rig = { git = "https://github.com/0xPlaygrounds/rig" }
base64 = "0.21"
thiserror = "1.0"
log = "0.4"
serde = { version = "1.0", features = ["derive"] }
serde_json = "1.0"
anyhow = "1.0"
async-trait = "0.1"
futures = "0.3"
reqwest = { version = "0.11", features = ["json"] }
tracing = "0.1"
tracing-subscriber = "0.3"
chrono = "0.4"
dotenv = "0.15"
uuid = { version = "1.0", features = ["v4"] }
axum = "0.6"
tower = "0.4"
tower-http = { version = "0.4", features = ["trace"] }
config = "0.13"

[dev-dependencies]
tokio-test = "0.4"
mock-it = "0.5"
