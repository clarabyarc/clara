[package]
name = "clara"
version = "0.1.0"
edition = "2021"
authors = ["Your Name <your.email@example.com>"]
description = "An AI-powered Twitter bot that transforms user avatars into cute cat illustrations with stories"

[dependencies]
# Rig Framework and components
rig-core = { git = "https://github.com/0xPlaygrounds/rig", features = ["full"] }
rig-mongodb = { git = "https://github.com/0xPlaygrounds/rig", optional = true }
rig-lancedb = { git = "https://github.com/0xPlaygrounds/rig", optional = true }
rig-neo4j = { git = "https://github.com/0xPlaygrounds/rig", optional = true }
rig-qdrant = { git = "https://github.com/0xPlaygrounds/rig", optional = true }

# Async Runtime
tokio = { version = "1.0", features = ["full", "sync", "macros", "rt-multi-thread"] }

# API Integration
reqwest = { version = "0.11", features = ["json", "multipart", "stream"] }
twitter-v2 = "0.1"

# AI Services
async-openai = "0.17"

# Serialization
serde = { version = "1.0", features = ["derive"] }
serde_json = "1.0"

# Error Handling
thiserror = "1.0"
anyhow = "1.0"

# Logging and Configuration
log = { version = "0.4", features = ["std"] }
env_logger = "0.10"
dotenv = "0.15"

# Utilities
chrono = { version = "0.4", features = ["serde"] }
rand = "0.8"
base64 = "0.21"
url = "2.4"

# Image Processing
image = { version = "0.24", features = ["png", "jpeg"] }
bytes = "1.0"

[features]
default = []
mongodb = ["rig-mongodb"]
lancedb = ["rig-lancedb"]
neo4j = ["rig-neo4j"]
qdrant = ["rig-qdrant"]

[dev-dependencies]
mockall = "0.11"
tokio-test = "0.4"

[profile.release]
opt-level = 3
lto = true
codegen-units = 1
panic = 'abort'
strip = true

[profile.dev]
opt-level = 0
debug = true
