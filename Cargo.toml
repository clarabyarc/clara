[package]
name = "clara"
version = "0.1.0"
edition = "2021"
authors = ["Your Name <your.email@example.com>"]
description = "An AI-powered Twitter bot that transforms user avatars into cute cat illustrations with stories"

[dependencies]
# Rig Framework and components
rig-core = "0.1"
rig-sqlite = "0.1"

# Async Runtime
tokio = { version = "1.0", features = ["full"] }

# API Integration
reqwest = { version = "0.11", features = ["json"] }
twitter-v2 = "0.1"

# AI Services
openai = { version = "1.0.0-alpha.18" }  # 修改了这行
async-openai = "0.17"

# Serialization
serde = { version = "1.0", features = ["derive"] }
serde_json = "1.0"

# Error Handling
thiserror = "1.0"
anyhow = "1.0"

# Logging and Configuration
log = "0.4"
env_logger = "0.10"
dotenv = "0.15"

# Utilities
chrono = "0.4"
rand = "0.8"
base64 = "0.21"
url = "2.4"

# Image Processing
image = "0.24"
bytes = "1.0"

[dev-dependencies]
mockall = "0.11"
tokio-test = "0.4"

[profile.release]
opt-level = 3
lto = true
codegen-units = 1
panic = 'abort'
strip = true

[profile.dev]
opt-level = 0
debug = true
