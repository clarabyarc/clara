[package]
name = "clara-bot"
version = "0.1.0"
edition = "2021"
authors = ["Your Name <your.email@example.com>"]
description = "An AI cat artist bot powered by RIG framework"

[dependencies]
rig = { git = "https://github.com/0xPlaygrounds/rig" }
tokio = { version = "1.28", features = ["full"] }
serde = { version = "1.0", features = ["derive"] }
serde_json = "1.0"
dotenv = "0.15"
chrono = "0.4"
async-trait = "0.1"
log = "0.4"
env_logger = "0.9"
thiserror = "1.0"
