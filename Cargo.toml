[package]
name = "clara"
version = "0.1.0"
edition = "2021"

[dependencies]
# Core RIG dependency
rig-core = { git = "https://github.com/0xPlaygrounds/rig" }

# AI and Cloud Services
openai = { version = "0.11" }
google-cloud = { version = "0.3", features = ["vision"] }

# Twitter API
twitter-v2 = "0.1.8"
oauth2 = "4.4"

# Async runtime and networking
tokio = { version = "1.0", features = ["full"] }
reqwest = { version = "0.11", features = ["json", "multipart"] }
futures = "0.3"

# Serialization
serde = { version = "1.0", features = ["derive"] }
serde_json = "1.0"

# Logging and error handling
log = "0.4"
env_logger = "0.9"
thiserror = "1.0"

# Utils
dotenv = "0.15"
chrono = { version = "0.4", features = ["serde"] }
base64 = "0.13"
rand = "0.8"

[dev-dependencies]
tokio-test = "0.4"
mock-it = "0.4"
